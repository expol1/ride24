<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset hasła - Ride24</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/helper/supabaseConfig.js"></script>
<style>
    body { font-family: 'Inter', sans-serif; background: #F8FAFC; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; }
    input { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border: 1px solid #E2E8F0; border-radius: 12px; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; }
    input:focus { border-color: #2563EB; }
    button { width: 100%; padding: 14px; background: #16A34A; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 12px; }
    button:hover { background: #15803d; }
    button:disabled { background: #94A3B8; cursor: not-allowed; }
</style>
</head>
<body>

<div class="box">
    <h2 style="color: #1E3A8A; margin-bottom: 5px;">Ustaw nowe hasło</h2>
    <p style="color: #64748B; font-size: 14px; margin-top: 0; margin-bottom: 20px;">Wpisz nowe, bezpieczne hasło.</p>
    
    <input type="password" id="password" placeholder="Nowe hasło (min. 8 znaków, 1 duża litera, 1 cyfra)">
    <input type="password" id="passwordConfirm" placeholder="Powtórz hasło">
    <button id="saveBtn" onclick="updatePassword()">Zapisz i przejdź do panelu</button>
</div>

<script>
const db = window.supabaseClient;
let authSubscription;

document.addEventListener("DOMContentLoaded", async () => {
    const { data } = db.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY' && session) {
            console.log("Recovery session active");
        }
    });
    
    authSubscription = data.subscription;

    setTimeout(async () => {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            alert("Nieprawidłowy lub wygasły link resetowania hasła.");
            window.location.href = "index.html";
        }
    }, 500); 
});

window.addEventListener("beforeunload", () => {
    if (authSubscription) {
        authSubscription.unsubscribe();
    }
});

async function updatePassword() {
    const btn = document.getElementById('saveBtn');
    
    if (btn.disabled) return;

    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    if (!password || password.length < 8) {
        alert("Hasło musi mieć min. 8 znaków.");
        return;
    }

    if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
        alert("Hasło musi zawierać przynajmniej jedną dużą literę i cyfrę.");
        return;
    }

    if (password !== passwordConfirm) {
        alert("Podane hasła nie są takie same.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Zapisywanie...";

    const { error } = await db.auth.updateUser({ password });

    if (error) {
        alert(error.message);
        btn.disabled = false;
        btn.innerText = "Zapisz i przejdź do panelu";
        return;
    } 
    
    alert("Hasło zostało pomyślnie zmienione!");
    await db.auth.signOut();
window.location.href = "index.html";
}
</script>

</body>
</html>

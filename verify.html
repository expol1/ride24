<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja Rezerwacji - Ride24</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --brand-blue: #10386a;
            --brand-green: #74d941;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f9;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .verify-card {
            background: white;
            width: 100%;
            max-width: 460px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: var(--brand-blue);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 12px;
            font-size: 14px;
        }

        .status-paid {
            background: var(--brand-green);
            color: var(--brand-blue);
        }

        .status-error {
            background: #ff4d4d;
            color: white;
        }

        .content {
            padding: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .label {
            color: #777;
            font-size: 14px;
        }

        .value {
            font-weight: 600;
            text-align: right;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--brand-blue);
            font-weight: bold;
        }

        .ok {
            color: var(--brand-green);
            font-weight: bold;
        }

        .bad {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="verify-card" id="app">
    <div class="loader">Sprawdzanie autentyczności vouchera...</div>
</div>

<script type="module">
const SUPABASE_URL = "https://zwyerdeuvyzgkgwglowr.supabase.co";
const SUPABASE_KEY = "sb_publishable_KMeRBCZCQH-S0Ubnr80v6w_Gub3vcQf";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function verify() {
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    let code = params.get('code');

    if (!code) {
        app.innerHTML = `
            <div class="header" style="background:#666">BŁĄD / ERROR</div>
            <div class="content">Brak kodu rezerwacji w URL / Missing booking code</div>
        `;
        return;
    }

    const { data: booking, error } = await supabase
        .from('bookings')
        .select(`
            reservation_code,
            status,
            start_date,
            end_date,
            pickup_time,
            return_time,
            pickup_location,
            pickup_location_join:partner_locations!pickup_location_id(location_name),
            car_classes(class_code)
        `)
        .eq('reservation_code', code.toUpperCase())
        .single();

    if (error || !booking) {
        app.innerHTML = `
            <div class="header status-error">NIEWAŻNY VOUCHER / INVALID VOUCHER</div>
            <div class="content">
                Kod / Code <b>${code}</b> nie istnieje / does not exist<br><br>
                <span class="bad">❌ Voucher nieautentyczny / Not authentic</span>
            </div>
        `;
        return;
    }

    // 🔥 SECURITY: Akceptujemy tylko opłacone vouchery
    const isValid = booking.status === 'paid';

    const pickup =
        booking.pickup_location_join?.location_name ||
        booking.pickup_location ||
        "-";

    const pTime = booking.pickup_time ? String(booking.pickup_time).substring(0,5) : "";
    const rTime = booking.return_time ? String(booking.return_time).substring(0,5) : "";

    // 🔥 DWUJĘZYCZNOŚĆ I LEPSZY UX STATUSÓW
    app.innerHTML = `
        <div class="header">
            <div style="font-size:12px;opacity:.8">WERYFIKACJA VOUCHERA / VOUCHER VERIFICATION</div>
            <div style="font-size:24px;font-weight:bold">${booking.reservation_code}</div>

            <div class="status-badge ${isValid ? 'status-paid' : 'status-error'}">
                ${isValid ? '✓ WAŻNY / VALID' : '✗ NIEWAŻNY / INVALID'}
            </div>
        </div>

        <div class="content">

            <div class="info-row">
                <span class="label">Status:</span>
                <span class="value ${isValid ? 'ok' : 'bad'}">
                    ${isValid ? 'Aktywna / Active' : 'Nieopłacona / Unpaid'}
                </span>
            </div>

            <div class="info-row">
                <span class="label">Klasa pojazdu / Vehicle class:</span>
                <span class="value">${booking.car_classes?.class_code || '-'}</span>
            </div>

            <div class="info-row">
                <span class="label">Miejsce odbioru / Pickup location:</span>
                <span class="value">${pickup}</span>
            </div>

            <div class="info-row">
                <span class="label">Odbiór / Pickup:</span>
                <span class="value">${booking.start_date} ${pTime}</span>
            </div>

            <div class="info-row">
                <span class="label">Zwrot / Return:</span>
                <span class="value">${booking.end_date} ${rTime}</span>
            </div>

            <div style="margin-top:20px;font-size:11px;color:#aaa;text-align:center">
                Ride24 Secure Verification<br>
                ${new Date().toLocaleString()}
            </div>
        </div>
    `;
}

verify();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trwa logowanie... | Ride24</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1e293b;
    }

    .loader-card {
      background: #ffffff;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 0 auto 20px auto;
      border-radius: 50%;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-left-color: #00e676;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 14px;
      color: #64748b;
      margin: 0;
      line-height: 1.5;
    }

    .error-state .spinner { display: none; }

    .error-icon {
      display: none;
      font-size: 40px;
      margin-bottom: 15px;
    }

    .error-state .error-icon { display: block; }

    .error-state h1 { color: #ef4444; }
  </style>
</head>

<body>

  <div class="loader-card" id="status-card">
    <div class="spinner"></div>
    <div class="error-icon">⚠️</div>
    <h1 id="status-title">Autoryzacja...</h1>
    <p id="status-desc">Łączenie z Twoim panelem Ride24...</p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/assets/helper/supabaseConfig.js"></script>

  <script>
    function updateUI(isError, title, description) {
      const card = document.getElementById('status-card');
      document.getElementById('status-title').innerText = title;
      document.getElementById('status-desc').innerText = description;

      if (isError) {
        card.classList.add('error-state');
      }
    }

    (async () => {
  try {
    const supabase = window.supabaseClient;

    if (!supabase) {
      updateUI(true, "Błąd systemu", "Brak połączenia z backendem.");
      return;
    }

    // 1. Sprawdzamy, czy sesja już istnieje 
    // (Supabase v2 automatycznie parsuje tokeny z fragmentu # w URL przy starcie)
    let { data: { session }, error: sessionError } = await supabase.auth.getSession();

    // 2. Jeśli sesji nie ma, sprawdzamy czy w URL jest parametr ?code= (flow PKCE dla maili)
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (!session && code) {
      const { data: exchangedData, error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);
      if (exchangeError) throw exchangeError;
      session = exchangedData.session;
    }

    // 3. Jeśli po tych próbach nadal nie ma sesji - link jest zły lub wygasł
    if (sessionError || !session) {
      console.error("Auth error:", sessionError);
      await supabase.auth.signOut(); 
      localStorage.clear();

      updateUI(true, "Błąd logowania", "Link wygasł lub sesja nie mogła zostać utworzona.");

      setTimeout(() => {
        window.location.href = "/";
      }, 2500);
      return;
    }

    // 4. Sesja jest poprawna -> Pobieramy profil, aby sprawdzić rolę
    const { data: profile, error: profileError } = await supabase
      .from("profiles")
      .select("role")
      .eq("id", session.user.id)
      .maybeSingle();

    if (profileError) {
        console.warn("Błąd pobierania profilu:", profileError);
    }

    // 5. Przekierowanie zależne od roli (z fallbackiem na klienta)
    const role = profile?.role || "klient";

    if (role === "admin") {
      window.location.href = "/admin/index.html";
    } else if (role === "partner") {
      window.location.href = "/partner-dashboard.html";
    } else {
      window.location.href = "/klient.html";
    }

  } catch (err) {
    console.error("Critical error:", err);
    await supabase.auth.signOut();
    updateUI(true, "Błąd krytyczny", "Coś poszło nie tak podczas autoryzacji.");
    setTimeout(() => { window.location.href = "/"; }, 3000);
  }
})();
  </script>

</body>
</html>

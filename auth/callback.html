<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trwa logowanie... | Ride24</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1e293b;
    }

    .loader-card {
      background: #ffffff;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 0 auto 20px auto;
      border-radius: 50%;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-left-color: #00e676;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 14px;
      color: #64748b;
      margin: 0;
      line-height: 1.5;
    }

    .error-state .spinner { display: none; }

    .error-icon {
      display: none;
      font-size: 40px;
      margin-bottom: 15px;
    }

    .error-state .error-icon { display: block; }

    .error-state h1 { color: #ef4444; }
  </style>
</head>

<body>

  <div class="loader-card" id="status-card">
    <div class="spinner"></div>
    <div class="error-icon">⚠️</div>
    <h1 id="status-title">Autoryzacja...</h1>
    <p id="status-desc">Łączenie z Twoim panelem Ride24...</p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/assets/helper/supabaseConfig.js"></script>

  <script>
    function updateUI(isError, title, description) {
      const card = document.getElementById('status-card');
      document.getElementById('status-title').innerText = title;
      document.getElementById('status-desc').innerText = description;

      if (isError) {
        card.classList.add('error-state');
      }
    }

    (async () => {
  try {
    const supabase = window.supabaseClient;

    if (!supabase) {
      updateUI(true, "Błąd systemu", "Brak połączenia z backendem.");
      return;
    }

    // 1. Próba wymiany kodu na sesję
    const { data, error } = await supabase.auth.exchangeCodeForSession(window.location.href);

    if (error) {
      console.error("Auth error:", error);
      
      // 🔥 KLUCZ: Jeśli jest błąd, czyścimy sesję, żeby strona główna nie robiła autoredirectu
      await supabase.auth.signOut(); 
      localStorage.clear(); // Czyścimy też dane rezerwacji, by nie straszyły

      updateUI(true, "Błąd logowania", "Link wygasł lub jest nieprawidłowy.");

      setTimeout(() => {
        window.location.href = "/";
      }, 2500);
      return;
    }

    if (!data?.session) {
      await supabase.auth.signOut();
      updateUI(true, "Brak sesji", "Spróbuj zalogować się ponownie.");
      setTimeout(() => { window.location.href = "/"; }, 2500);
      return;
    }

    // 2. Jeśli sesja OK -> Sprawdzamy profil
    const { data: profile } = await supabase
      .from("profiles")
      .select("role")
      .eq("id", data.session.user.id)
      .maybeSingle();

    if (!profile) {
      // Jeśli profilu nie ma, domyślnie klient
      window.location.href = "/klient.html";
      return;
    }

    // 3. Przekierowanie zależne od roli
    if (profile.role === "admin") {
      window.location.href = "/admin/index.html";
    } else if (profile.role === "partner") {
      window.location.href = "/partner-dashboard.html";
    } else {
      window.location.href = "/klient.html";
    }

  } catch (err) {
    console.error("Critical error:", err);
    updateUI(true, "Błąd krytyczny", "Coś poszło nie tak.");
    setTimeout(() => { window.location.href = "/"; }, 2500);
  }
})();
  </script>

</body>
</html>

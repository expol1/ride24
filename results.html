<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyniki wyszukiwania - Ride24</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap">
    <style>
        :root {
            --blue: #2563EB;
            --blue-dark: #1E3A8A;
            --green: #16A34A;
            --green-light: #DCFCE7; /* Jasna, soczysta zieleń w tle detali */
            --text-main: #0F172A;
            --text-muted: #64748B;
            --bg-price: #F8FAFC; /* Bardzo jasny szary dla sekcji ceny */
            --border: rgba(226, 232, 240, 0.9);
        }
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background: 
                radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(15, 23, 42, 0.9) 100%),
                url('tlo.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay-vignette {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(37, 99, 235, 0.2) 0%, transparent 30%, transparent 70%, rgba(37, 99, 235, 0.2) 100%);
            pointer-events: none; z-index: 0;
        }

        .container { 
            position: relative; z-index: 1;
            max-width: 1050px; margin: 0 auto; padding: 30px 20px;
        }
        
        /* --- HEADER --- */
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding: 12px 24px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px); border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo-image { max-height: 42px; }
        h1 { font-family: 'Manrope', sans-serif; color: white; margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        
        .btn-back { 
            text-decoration: none; color: white; font-weight: 700; font-size: 13px;
            background: var(--blue); padding: 10px 20px; border-radius: 10px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { transform: translateY(-2px); background: var(--blue-dark); }

        /* --- LISTA AUT (KOMPAKTOWA) --- */
        .car-list { display: flex; flex-direction: column; gap: 14px; }
        
        .car-row { 
            display: flex !important; flex-direction: row !important; align-items: stretch;
            background: white; 
            border: 1px solid var(--border); border-radius: 16px; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
        }
        .car-row:hover { border-color: var(--green); box-shadow: 0 15px 35px rgba(0,0,0,0.15); transform: translateY(-1px); }

        .car-img-box { 
            width: 220px; padding: 15px; background: white;
            display: flex; align-items: center; justify-content: center;
            border-right: 1px solid var(--border);
        }
        .car-img-box img { width: 100%; height: auto; object-fit: contain; transition: transform 0.3s ease; }
        .car-row:hover .car-img-box img { transform: scale(1.05); }

        /* SEKCJA DETALI */
        .car-details-box { 
            flex: 1; padding: 16px 24px; 
            background: var(--green-light); 
            display: flex; position: relative; flex-direction: column; justify-content: center;
        }
        
        .car-title { font-size: 21px; font-weight: 800; color: var(--blue-dark); font-family: 'Manrope', sans-serif; margin: 0 0 14px 0; display: flex; align-items: baseline; gap: 6px; }
        .car-title span { font-size: 13px; font-weight: 600; color: var(--text-muted); font-family: 'Inter', sans-serif;}
        
        /* KOLOROWY BADGE KLASY */
        .class-badge-box {
            position: absolute; top: 16px; right: 24px;
            border-width: 2px; border-style: solid;
            width: 55px; height: 60px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            z-index: 2;
        }
        .class-letter { font-size: 28px; font-weight: 900; line-height: 1; font-family: 'Manrope', sans-serif; }
        .class-name-small { font-size: 8px; font-weight: 800; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px; }

       .feature-grid {
    display: grid;
    grid-template-columns: auto auto;
    gap: 6px 30px;
    align-items: center;
}

.feature-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #166534;
}

.feature-item svg {
    width: 16px;
    height: 16px;
    color: var(--green);
    flex-shrink: 0;
}
        /* SEKACJA CENY */
        .car-price-box { 
            width: 220px; min-width: 220px; background: var(--bg-price);
            padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-left: 1px solid var(--border);
        }

        .price-info { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .price-total { font-size: 32px; font-weight: 800; color: var(--text-main); font-family: 'Manrope', sans-serif; margin-bottom: 12px; letter-spacing: -0.5px; display: flex; align-items: baseline; gap: 4px;}
        .price-total span { font-size: 15px; color: var(--text-muted); font-weight: 700;}

        .btn-book { 
            background: var(--green); color: white; border: none; 
            padding: 14px; border-radius: 10px; font-weight: 800; font-size: 14px; 
            cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(22, 163, 74, 0.25); letter-spacing: 0.5px;
        }
        .btn-book:hover { background: #15803d; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(22, 163, 74, 0.35); }
        .btn-book:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        /* TOAST ANIMACJE */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: white; border-left: 6px solid var(--green); padding: 16px 24px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); font-weight: 700; font-size: 14px; color: var(--blue-dark); display: flex; align-items: center; gap: 12px; animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }

        @media (max-width: 850px) {
            .car-row { flex-direction: column !important; }
            .car-img-box, .car-price-box { width: 100%; min-width: 100%; border: none; }
            .car-price-box { border-top: 1px solid var(--border); padding: 20px; }
            .class-badge-box { top: -35px; right: 20px; }
        }
    </style>

    <script>
        // 🔥 POBIERANIE KURSU WALUTY (NBP)
async function getExchangeRate(currency) {
    try {
        if (currency === "EUR") {
            const res = await fetch("https://api.nbp.pl/api/exchangerates/rates/A/EUR/?format=json");
            const data = await res.json();
            return data.rates[0].mid;
        }

        if (currency === "USD") {
            const res = await fetch("https://api.nbp.pl/api/exchangerates/rates/A/USD/?format=json");
            const data = await res.json();
            return data.rates[0].mid;
        }

        // fallback
        return 4.3;

    } catch (err) {
        console.error("❌ Błąd pobierania kursu:", err);
        return 4.3;
    }
}

        const classNames = { 
            A: "Economy", 
            B: "Compact", 
            C: "Sedan", 
            D: "SUV", 
            E: "Premium", 
            F: "Van" 
        };

        const badgeColors = {
            A: { bg: '#FFFBEB', border: '#FDE68A', color: '#D97706' }, 
            B: { bg: '#EFF6FF', border: '#BFDBFE', color: '#2563EB' }, 
            C: { bg: '#FAF5FF', border: '#E9D5FF', color: '#7E22CE' }, 
            D: { bg: '#FEF2F2', border: '#FECACA', color: '#DC2626' }, 
            E: { bg: '#1E293B', border: '#334155', color: '#FBBF24' }, 
            F: { bg: '#F0FDFA', border: '#99F6E4', color: '#0D9488' }  
        };

        function getFeaturesForClass(classCode) {
            const lang = localStorage.getItem("lang") || "pl";
            const f = {
                'A': { seats: 4, bags: 1, trans: lang === 'pl' ? 'Manualna' : 'Manual' },
                'B': { seats: 5, bags: 2, trans: lang === 'pl' ? 'Manualna' : 'Manual' },
                'C': { seats: 5, bags: 3, trans: lang === 'pl' ? 'Automatyczna' : 'Automatic' },
                'D': { seats: 5, bags: 4, trans: lang === 'pl' ? 'Automatyczna' : 'Automatic' },
                'E': { seats: 5, bags: 3, trans: lang === 'pl' ? 'Automatyczna' : 'Automatic' },
                'F': { seats: 7, bags: 4, trans: lang === 'pl' ? 'Manualna' : 'Manual' }
            };
            return f[classCode] || f['A'];
        }

        window.showToast = function(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✅ ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s ease forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };

        async function renderCars() {
            const container = document.getElementById('results-container');
            const db = window.supabaseClient; 
            
            container.innerHTML = '<p style="color:white; text-align:center; padding:50px; font-size:18px; font-weight:600;">Wyszukujemy najlepsze oferty w bazie Ride24...</p>';

            try {
                const searchParamsStr = localStorage.getItem("searchParams");
                if (!searchParamsStr) {
                    window.location.href = "index.html";
                    return;
                }

                const filters = JSON.parse(searchParamsStr);
                const loc = filters.pickup_location; 

                // --- 🛡️ ZABEZPIECZENIE PRZED STARYMI DANYMI (EDGE CASE) ---
                if (!loc || !loc.type || !loc.name) {
                    console.error("Nieprawidłowy format lokalizacji. Powrót do strony głównej.");
                    window.location.href = "index.html";
                    return;
                }
                // ---------------------------------------------------------

                // Nagłówek wyników (Szlif UX: "Dostępne auta w: ...")
                document.querySelector("h1").innerText = `Dostępne auta w: ${loc.name}`;

                const start = new Date(filters.pickup_date);
                const end = new Date(filters.drop_date);
                const days = Math.max(1, Math.ceil((end - start) / (1000 * 60 * 60 * 24)));

                // 1. BUDOWANIE ZAPYTANIA Z UWZGLĘDNIENIEM MIAST I REGIONÓW
                let query = db
    .from('car_classes')
    .select(`
        *,
        partners!inner(
            id,
            company_name,
            active,
            account_status,
            currency,
            min_driver_age,
            partner_locations!inner(
                country,
                region,
                city,
                location_name,
                active
            )
        )
    `)
    .eq('active', true)
    .eq('partners.active', true)
    .eq('partners.account_status', 'active') 
    .eq('partners.partner_locations.active', true);
    
                
                // 2. MAGICZNY FILTR INTENCJI
                if (loc.type === "city") {
                    query = query.eq('partners.partner_locations.city', loc.city);
                } else if (loc.type === "region") {
                    query = query.eq('partners.partner_locations.region', loc.region);
                } else {
                    query = query.eq('partners.partner_locations.country', loc.country);
                }

                // 📄 4️⃣ PAGINACJA (Limit wyników)
                const PAGE_SIZE = 20;
                const { data: rawCars, error } = await query.limit(PAGE_SIZE);
                if (error) throw error;

                container.innerHTML = '';

                // 3. DEDUPLIKACJA AUT
                const unique = new Map();
                if (rawCars) {
                    rawCars.forEach(car => {
                        const partnerId = car.partners?.id;
                        if (!partnerId) return;
                        const key = `${car.id}-${partnerId}`;
                        if (!unique.has(key)) unique.set(key, car);
                    });
                }
                let cars = Array.from(unique.values());

                // --- 🚀 KROK 4: ANALITYKA ---
                console.log("SEARCH_LOG:", {
                    query: loc.name,
                    type: loc.type,
                    results_count: cars.length,
                    timestamp: new Date().toISOString()
                });

                // --- 💰 KROK 1: RANKING (Sortowanie po marży) ---
                // --- 💰 KROK 1: RANKING (Sortowanie po marży + VIP) ---
                cars.sort((a, b) => {
                    // 💎 1. NAJPIERW auta z kierowcą na samą górę!
                    const aVip = a.driver_included === true ? 1 : 0;
                    const bVip = b.driver_included === true ? 1 : 0;
                    if (aVip !== bVip) return bVip - aVip;

                    // 💰 2. Następnie sortujemy (wewnątrz grup VIP / Zwykłe) po marży
                    const marginA = (a.final_customer_price || 0) - (a.base_price || 0);
                    const marginB = (b.final_customer_price || 0) - (b.base_price || 0);
                    if (marginB !== marginA) return marginB - marginA; 
                    
                    // 💵 3. A jeśli marże równe, wygrywa tańsze dla klienta
                    return a.final_customer_price - b.final_customer_price;
                });

                if (cars.length === 0) {
                    const lang = localStorage.getItem("lang") || "pl";
                    let suggestion = "";
                    if (loc.type === 'city') {
                        suggestion = lang === 'pl' ? `Spróbuj wyszukać cały region: <b>${loc.region}</b> lub kraj.` : `Try searching the entire region: <b>${loc.region}</b> or country.`;
                    } else if (loc.type === 'region') {
                        suggestion = lang === 'pl' ? `Spróbuj wyszukać w całym kraju: <b>${loc.country}</b>.` : `Try searching in the entire country: <b>${loc.country}</b>.`;
                    }

                    container.innerHTML = `
                        <div style="text-align:center; color:white; padding:50px; background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);">
                            <h3 style="font-size: 24px; margin-bottom: 10px;">Brak dostępnych aut w: ${loc.name}</h3>
                            <p style="color: #94A3B8; font-size: 16px; margin-bottom: 20px;">${suggestion}</p>
                            <a href="index.html" style="color: var(--blue); font-weight: 700; text-decoration: underline;">Wróć i zmień lokalizację</a>
                        </div>`;
                    return;
                }

               // 4. GENEROWANIE KAFELKÓW (Z walidacją i tłumaczeniem)
                cars.forEach((car, index) => {
                    console.log("CAR:", car);
                    const lang = localStorage.getItem("lang") || "pl";
                    const minAge = car.partners?.min_driver_age || 21;
                    
                    // 🛡️ 1️⃣ WALIDACJA DANYCH (Safe Prices)
                    const basePricePerDay = Number(car.partner_net_price) || 0;
                    const baseTotal = Number((basePricePerDay * days).toFixed(2));
                    const finalTotal = Number((baseTotal * 1.25).toFixed(2));

                    const classLetter = (car.class_code || "A").charAt(0).toUpperCase();
                    const bc = badgeColors[classLetter] || badgeColors['A'];
                    const carCurrency = car.partners?.currency || 'EUR';

                    // 🌍 2️⃣ PRIORYTET: dane partnera > fallback klasy
                    const fallbackFeat = getFeaturesForClass(classLetter);
                    
                    // BEZPIECZNA SKRZYNIA BIEGÓW (A, AUTO, AUTOMATIC)
                    const transmissionRaw = (car.transmission || '').toUpperCase();
                    
                    const feat = {
                        seats: car.seats ?? fallbackFeat.seats,
                        bags: car.bags ?? fallbackFeat.bags,
                        trans: transmissionRaw 
                            ? (['A', 'AUTO', 'AUTOMATIC'].includes(transmissionRaw)

<div class="car-details-box">

                font-weight: 700; font-size: 12px; padding: 6px 12px;

                // 📄 4️⃣ KOMUNIKAT O LIMITACH (Transparentność ofert)

       // --- INTELIGENTNA REZERWACJA (UPROSZCZONA I BEZPIECZNA) ---
        let authMode = "login";

        async function handleBooking(carId, priceTotal, currency, btnElement) {
            const { data, error } = await window.supabaseClient.rpc('calculate_booking_price', {
    car_id: carId,
    start_date: localStorage.getItem("bookingStartDate"),
    end_date: localStorage.getItem("bookingEndDate")
});

if (error) {
    console.error("RPC ERROR:", error);
} else {
    console.log("SECURE PRICE:", data);
}
            const db = window.supabaseClient;
            
            // 🔥 1. ZAPISUJEMY KONTEKST OD RAZU PRZED CZYMKOLWIEK (Kluczowa poprawka)
            localStorage.setItem("selectedCarId", carId);
            
            localStorage.setItem("autoOpenBooking", "true");
            // 🔥 ZAPIS CEN (KLUCZOWE)
// 🔥 CENA PARTNERA (to co masz z floty)
const basePrice = Number(priceTotal) || 0;

// 👉 Twoja marża 25%
const commission = basePrice * 0.25;

// 👉 CENA DLA KLIENTA (informacyjna)
const finalPrice = basePrice + commission;

// 🔥 LIVE KURS (NBP)
let rate = 4.3;
const liveRate = await getExchangeRate(currency);

if (liveRate) {
    rate = liveRate;
}
console.log("📡 LIVE RATE:", rate);

// 👉 PLN (Twoja prowizja)
const commissionPLN = Number((commission * rate).toFixed(2));

// 👉 PARTNER DOSTAJE 100% SWOJEJ KWOTY
const partnerPart = basePrice;

// 🔥 ZAPIS
localStorage.setItem("bookingFinalPrice", finalPrice);
localStorage.setItem("bookingOnlinePln", commissionPLN);
localStorage.setItem("bookingPickupPrice", partnerPart);
localStorage.setItem("bookingCurrency", currency);

// 🔥 DEBUG
console.log("💾 ZAPISANO CENY:", {
    currency,
    rate,
    basePrice,
    finalPrice,
    commissionPLN,
    partnerPart
});

            // Przenosimy też daty z wyszukiwania
            // 🔥 FULL BOOKING CONTEXT (NOWE - ZAMIAST starego bloku)
const searchParamsStr = localStorage.getItem("searchParams");

if (searchParamsStr) {
    const searchParams = JSON.parse(searchParamsStr);

    // 🔥 zapis pełnego kontekstu
    localStorage.setItem("bookingContext", JSON.stringify({
        car_id: carId,
        location: searchParams.pickup_location,
        start_date: searchParams.pickup_date,
        end_date: searchParams.drop_date,
        created_at: new Date().toISOString()
    }));

    // 🔥 kompatybilność (zostawiamy stare pola żeby nic nie pękło)
    localStorage.setItem("bookingStartDate", searchParams.pickup_date);
localStorage.setItem("bookingEndDate", searchParams.drop_date);

// 🔥 GODZINY (SAFE)
const pickupTime = searchParams?.pickup_time || "10:00";
const dropTime = searchParams?.drop_time || "10:00";

localStorage.setItem("bookingPickupTime", pickupTime);
localStorage.setItem("bookingDropTime", dropTime);

}

// 🔥 wersjonowanie (future-proof)
localStorage.setItem("bookingFlowVersion", "v2");

            const { data: { session } } = await db.auth.getSession();

            // Jeśli NIEZALOGOWANY -> otwieramy modal
            if (!session) {
                openAuth();
                return;
            }

            // Jeśli ZALOGOWANY -> blokujemy przycisk i lecimy od razu do panelu
            if (btnElement) {
                btnElement.innerText = localStorage.getItem("lang") === 'pl' ? "PRZETWARZAM..." : "PROCESSING...";
                btnElement.disabled = true;
            }

            window.showToast(localStorage.getItem("lang") === 'pl' ? "Świetny wybór! Przechodzimy do rezerwacji..." : "Great choice! Redirecting...");
            
            setTimeout(() => {
                window.location.href = "klient.html";
            }, 800);
        }

        // --- OBSŁUGA OKIENKA LOGOWANIA ---
        function openAuth() {
            document.getElementById("authModal").style.display = "flex";
        }

        function closeAuth() {
            document.getElementById("authModal").style.display = "none";
            
            // 🔥 MICRO-SZLIF UX: Powiadomienie o przerwaniu rezerwacji
            if (localStorage.getItem("selectedCarId")) {
                const lang = localStorage.getItem("lang") || "pl";
                window.showToast(lang === 'pl' ? "Wybierz auto ponownie" : "Please select a car again");
            }

            // 🔥 PEŁNE CZYSZCZENIE KONTEKSTU (Ochrona przed Ghost Bookingami)
            localStorage.removeItem("autoOpenBooking");
            localStorage.removeItem("selectedCarId");
            localStorage.removeItem("bookingStartDate");
            localStorage.removeItem("bookingEndDate");
            localStorage.removeItem("bookingContext");
            localStorage.removeItem("bookingFlowVersion");
        }

        function toggleMode() {
            authMode = authMode === "login" ? "register" : "login";
            const isReg = authMode === "register";
            const lang = localStorage.getItem("lang") || "pl";

            document.getElementById("reg-name").style.display = isReg ? "block" : "none";
            document.getElementById("reg-terms-group").style.display = isReg ? "block" : "none"; 
            
            document.getElementById("modalTitle").innerText = isReg ? (lang==='pl'?"Załóż konto":"Sign up") : (lang==='pl'?"Logowanie":"Login");
            document.getElementById("mainAuthBtn").innerText = isReg ? (lang==='pl'?"Zarejestruj się":"Sign up") : (lang==='pl'?"Zaloguj się":"Log in");
            document.getElementById("toggleText").innerText = isReg ? (lang==='pl'?"Masz już konto?":"Have an account?") : (lang==='pl'?"Nie masz konta?":"No account?");
            document.getElementById("toggleBtn").innerText = isReg ? (lang==='pl'?"Zaloguj się":"Log in") : (lang==='pl'?"Zarejestruj się":"Sign up");
        }
        
       async function handleAuth() {
    const btn = document.getElementById("mainAuthBtn");
    const lang = localStorage.getItem("lang") || "pl";
    const db = window.supabaseClient;

    // 🛡️ 1. TURNSTILE CHECK
    const token = document.querySelector('[name="cf-turnstile-response"]')?.value;
    if (!token) {
        if (window.turnstile) window.turnstile.reset();
        return window.showToast(lang === 'pl' ? "Potwierdź, że nie jesteś robotem" : "Confirm you are human", "error");
    }

    // 🛡️ 2. WALIDACJA PÓL
    const email = document.getElementById("auth-email").value.trim().toLowerCase();
    const pass = document.getElementById("auth-password").value.trim();
    const name = document.getElementById("reg-name") ? document.getElementById("reg-name").value.trim() : "";

    if (!email || !email.includes("@")) {
        return window.showToast(lang === 'pl' ? "Podaj poprawny email" : "Enter valid email", "error");
    }
    if (pass.length < 8) {
        return window.showToast(lang === 'pl' ? "Hasło min. 8 znaków" : "Password min. 8 chars", "error");
    }

    if (authMode === "register") {
        if (!name) return window.showToast(lang === 'pl' ? "Podaj imię i nazwisko" : "Enter full name", "error");
        if (!document.getElementById("reg-terms-checkbox").checked) {
            return window.showToast(lang === 'pl' ? "Musisz zaakceptować regulamin" : "Accept terms first", "error");
        }
    }

    // 🚀 3. START PROCESU
    btn.innerText = lang === 'pl' ? "PRZETWARZANIE..." : "PROCESSING...";
    btn.disabled = true;

    try {
        if (authMode === "login") {
            const { data, error } = await db.auth.signInWithPassword({
                email, password: pass, options: { captchaToken: token }
            });

            if (error) throw error;

            if (!data.session) {
                window.showToast(lang === 'pl' ? "Potwierdź email przed logowaniem" : "Confirm email first", "error");
                btn.disabled = false;
                btn.innerText = lang === 'pl' ? "Zaloguj się" : "Log in";
                return;
            }

            // ✅ Logowanie OK -> jedziemy do panelu (gdzie czeka autoOpenBooking)
            window.location.href = "klient.html";

        } else {
            // 📝 REJESTRACJA
            const { data, error } = await db.auth.signUp({
                email, password: pass,
                options: {
                    data: { full_name: name },
                    // 🔥 Dynamiczny adres callbacka (zadziała i na localhost i na serwerze)
                    emailRedirectTo: window.location.origin + '/auth/callback.html',
                    captchaToken: token
                }
            });

            if (error) throw error;

            window.showToast(lang === 'pl' ? "Sprawdź email, aby aktywować konto!" : "Check email to activate!", "success");
            
            // Przywracamy przycisk, żeby user nie myślał, że strona zawisła
            btn.disabled = false;
            btn.innerText = lang === 'pl' ? "Zarejestruj się" : "Sign up";
        }
    } catch (err) {
        window.showToast(err.message, "error");
        btn.disabled = false;
        btn.innerText = authMode === "login" ? (lang === 'pl' ? "Zaloguj się" : "Log in") : (lang === 'pl' ? "Zarejestruj się" : "Sign up");
    } finally {
        if (window.turnstile) window.turnstile.reset();
    }
}

        async function loginGoogle() {
    const db = window.supabaseClient;
    
    // Kierujemy na callback.html - to on jest "mózgiem", który wie, kogo gdzie wysłać
    const { error } = await db.auth.signInWithOAuth({
        provider: "google",
        options: {
            redirectTo: window.location.origin + "/auth/callback.html"
        }
    });

    if (error) window.showToast("Google error: " + error.message, "error");
}
